version: "3.9"

services:
  serve:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serve
    image: deepseek-v4-mini:serve
    ports:
      - "8000:8000"
    volumes:
      - ../checkpoints/sft/checkpoint-final:/models/deepseek-v4-mini:ro
      - ../checkpoints/tokenizer:/models/tokenizer:ro
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    shm_size: "8gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - serve
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://serve:8000/v1
      - OPENAI_API_KEY=EMPTY
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  open-webui-data:
