name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.4.10 black==24.4.2 isort==5.13.2
      - name: Ruff
        run: ruff check src tests
      - name: Black
        run: black --check src tests
      - name: Isort
        run: isort --check-only src tests

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install (CPU only)
        run: |
          python -m pip install --upgrade pip
          # 用 CPU torch 加快
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[serve,eval,dev]"
      - name: Run unit tests
        run: |
          pytest tests/ -v --ignore=tests/integration -m "not slow" \
              --maxfail=3 --durations=20
        env:
          PYTHONHASHSEED: "0"
          OMP_NUM_THREADS: "2"

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[serve,eval,dev]"
      - name: Run integration tests
        run: |
          pytest tests/integration -v -m integration --maxfail=1 --durations=20
        env:
          OMP_NUM_THREADS: "2"

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
