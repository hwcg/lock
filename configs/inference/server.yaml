# DeepSeek-V4-Mini OpenAI 兼容服务端默认配置

# ---- 模型 ----
model_path: "checkpoints/sft/checkpoint-final"
tokenizer_path: "checkpoints/tokenizer"
model_name: "deepseek-v4-mini"
model_aliases: ["deepseek-chat", "ds4-mini"]

device: "cuda"
dtype: "bfloat16"
max_model_len: 4096
yarn_factor: null

# ---- HTTP ----
host: "0.0.0.0"
port: 8000
api_key: null                          # 设置后所有请求需带 Authorization: Bearer xxx
allow_origins: ["*"]
request_timeout: 600.0

# ---- 批处理 ----
max_batch_size: 4
batch_wait_ms: 8
max_concurrent_requests: 64

# ---- 生成默认值 ----
default_max_tokens: 1024
default_temperature: 0.7
default_top_p: 1.0
default_top_k: 0
default_repetition_penalty: 1.0

# ---- 功能开关 ----
enable_chat_completions: true
enable_completions: true
enable_embeddings: false
enable_models: true
enable_health: true

default_thinking_mode: "auto"          # auto / chat / thinking
drop_thinking_in_context: true
enable_tool_calls: true

# ---- 日志 ----
log_level: "INFO"
log_request_payload: false
api_keys_file: null
