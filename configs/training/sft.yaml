# DeepSeek-V4 Mini SFT 配置

# ============ 输出 ============
output_dir: "checkpoints/sft"
run_name: "ds4-mini-sft-v1"
project_name: "deepseek-v4-mini"

# ============ 数据 ============
train_data_paths:
  - "data/processed/sft.jsonl"
eval_data_paths: []
max_seq_len: 4096
cache_dir: "cache/datasets"
thinking_mode_default: "chat"
mask_user: true

# ============ 模型 / 分词器 ============
model_config_path: "configs/model/mini_2b.json"
tokenizer_path: "checkpoints/tokenizer"
init_from_checkpoint: "checkpoints/pretrain/checkpoint-100000"

# ============ 训练超参 ============
seed: 42
max_steps: 5000
max_epochs: 3
micro_batch_size: 2
gradient_accumulation_steps: 16
log_steps: 10
eval_steps: 500
save_steps: 500

# ============ 优化器 / 调度器 ============
optimizer: "adamw"
learning_rate: 2.0e-5
weight_decay: 0.01
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1.0e-8
max_grad_norm: 1.0

scheduler: "cosine"
warmup_steps: 100
min_lr_ratio: 0.1

# ============ 精度 / 优化 ============
precision: "bf16"
gradient_checkpointing: true

# ============ DataLoader ============
num_workers: 4
pin_memory: true

# ============ 分布式 ============
distributed_backend: "nccl"
use_deepspeed: false

# ============ Checkpoint ============
keep_last: 3
keep_best: 2
metric_name: "eval_loss"
metric_mode: "min"
save_format: "safetensors"
resume_from_checkpoint: "auto"

# ============ Logging ============
logger_backends: ["jsonl", "wandb"]

# ============ SFT 专属 ============
z_loss_weight: 0.0
aux_loss_weight: 0.001
use_aux_loss: true
loss_reduction: "token"
label_smoothing: 0.0
neftune_alpha: 5.0
